<!DOCTYPE html>
<html>
<head>
  <title>BIM Blockchain System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand mb-0 h1">🏗️ BIM Blockchain Sharing</span>
  <button class="btn btn-success" onclick="connectWallet()">Connect Wallet</button>
</nav>

<div class="container mt-4">

  <!-- Wallet -->
  <div class="alert alert-info">
    <strong>Wallet:</strong> <span id="account">Not connected</span>
  </div>

  <!-- Upload Card -->
  <div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      Upload BIM File
    </div>
    <div class="card-body">

      <input type="file" id="fileInput" class="form-control mb-3">

      <button class="btn btn-warning mb-2" onclick="generateHash()">Generate Hash</button>

      <p><strong>Generated Hash:</strong></p>
      <div class="bg-light p-2 border" id="generatedHash">Hash will appear here</div>

      <button class="btn btn-success mt-3" onclick="uploadFile()">Upload to Blockchain</button>

      <div id="uploadResult" class="mt-3"></div>
    </div>
  </div>

  <div class="card shadow mb-4">
    <div class="card-header bg-dark text-white">
      My Files
    </div>
    <div class="card-body">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>ID</th>
            <th>File Name</th>
            <th>CID</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="fileTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Grant Access -->
  <div class="card shadow mb-4">
    <div class="card-header bg-warning">
      Grant Access
    </div>
    <div class="card-body">

      <input type="number" id="fileId" class="form-control mb-2" placeholder="File ID">

      <input type="text" id="userAddress" class="form-control mb-2" placeholder="User Address">

      <button class="btn btn-primary" onclick="grantAccess()">Grant Access</button>

      <div id="accessResult" class="mt-3"></div>
    </div>
  </div>

  <!-- Get File -->
  <div class="card shadow mb-4">
    <div class="card-header bg-success text-white">
      Retrieve File
    </div>
    <div class="card-body">

      <input type="number" id="getFileId" class="form-control mb-2" placeholder="File ID">

      <button class="btn btn-dark" onclick="getFile()">Get File</button>

      <div id="fileResult" class="mt-3"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
<script src="app.js"></script>

</body>
</html>
